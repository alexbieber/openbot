<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444">
        <animate attributeName="stop-color" values="#ef4444;#f97316;#eab308;#22c55e;#3b82f6;#8b5cf6;#ef4444" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="20%" stop-color="#f97316">
        <animate attributeName="stop-color" values="#f97316;#eab308;#22c55e;#3b82f6;#8b5cf6;#ef4444;#f97316" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" stop-color="#eab308">
        <animate attributeName="stop-color" values="#eab308;#22c55e;#3b82f6;#8b5cf6;#ef4444;#f97316;#eab308" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#22c55e">
        <animate attributeName="stop-color" values="#22c55e;#3b82f6;#8b5cf6;#ef4444;#f97316;#eab308;#22c55e" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" stop-color="#3b82f6">
        <animate attributeName="stop-color" values="#3b82f6;#8b5cf6;#ef4444;#f97316;#eab308;#22c55e;#3b82f6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#ef4444;#f97316;#eab308;#22c55e;#3b82f6;#8b5cf6" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8b5cf6">
        <animate attributeName="flood-opacity" values="0.3;0.55;0.3" dur="2.5s" repeatCount="indefinite"/>
      </feDropShadow>
    </filter>
  </defs>

  <!-- Outer rounded square background -->
  <rect x="8" y="8" width="104" height="104" rx="24" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="8" y="8" width="104" height="50" rx="24" fill="white" opacity="0.08"/>

  <!-- Antenna stem -->
  <rect x="55" y="16" width="10" height="18" rx="5" fill="url(#glow)" opacity="0.95"/>
  <!-- Antenna dot -->
  <circle cx="60" cy="14" r="7" fill="url(#glow)">
    <animate attributeName="opacity" values="1;0.88;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="14" r="3.5" fill="white" opacity="0.6"/>

  <!-- Head/face plate -->
  <rect x="20" y="30" width="80" height="66" rx="14" fill="white" opacity="0.1"/>
  <rect x="22" y="32" width="76" height="62" rx="12" fill="#0d1117" opacity="0.5"/>

  <!-- Left eye -->
  <circle cx="42" cy="60" r="13" fill="white" opacity="0.92"/>
  <circle cx="42" cy="60" r="7" fill="url(#bg)"/>
  <circle cx="45" cy="57" r="2.5" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.5;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Right eye -->
  <circle cx="78" cy="60" r="13" fill="white" opacity="0.92"/>
  <circle cx="78" cy="60" r="7" fill="url(#bg)"/>
  <circle cx="81" cy="57" r="2.5" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.5;0.8" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>

  <!-- Mouth / expression bar -->
  <rect x="38" y="80" width="44" height="8" rx="4" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.5;0.7" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Side bolts -->
  <circle cx="22" cy="55" r="4" fill="white" opacity="0.25"/>
  <circle cx="22" cy="68" r="4" fill="white" opacity="0.25"/>
  <circle cx="98" cy="55" r="4" fill="white" opacity="0.25"/>
  <circle cx="98" cy="68" r="4" fill="white" opacity="0.25"/>
</svg>
